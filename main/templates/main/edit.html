{% extends 'base.html' %}

{% block content %}
<div class="profile-card">
    <h1 class="my-name">NEW POST</h1>

    <form action="{% url 'main:create' %}" method="POST">
        {% csrf_token %}

        <p>
            <label for="title">제목: </label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </p>

        <p>
            <label for="writer">작성자: </label>
            <input type="text" id="writer" name="writer" value="{{ post.writer }}" required>
        </p>

        <p>
            <label for="content">내용: </label><br>
            <textarea id="content" name="content" rows="15" cols="100" required>{{ post.content }}</textarea>
        </p>

        <p>
            <label for="category">카테고리: </label>
            <select id="category" name="category" style="padding: 5px;" value="{{ post.title }}" required>
                <option value="자유">자유</option>
                <option value="공부">공부</option>
                <option value="독서">독서</option>
                <option value="일기">일기</option>
            </select>
        </p>

        <p>
            <label for="pub_date">이전 작성일: {{ post.pub_date }}<label>

        </p>

        <button type="submit">수정하기</button>
    </form>
</div>

{% endblock %}
